name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ---------- Q1 lint ----------
      - name: Lint (pylint)
        run: pylint polls accounts pollme seeder.py --fail-under=9.0

      # ---------- Q3 unit tests ----------
      - name: Unit tests + coverage
        run: pytest tests/unit/ --cov --cov-report=term --cov-report=xml

      # ---------- Q7 integration tests ----------
      - name: Integration tests
        run: pytest tests/integration/ -v

      # ---------- Q4 performance smoke ----------
      # Short Locust run (~30 s) — fails the build only if errors >5%.
      - name: Performance smoke (Locust)
        run: |
          DJANGO_DB_PATH=$PWD/perf_test.sqlite3 python manage.py migrate --noinput
          DJANGO_DB_PATH=$PWD/perf_test.sqlite3 python perf/seed_perf.py
          DJANGO_DB_PATH=$PWD/perf_test.sqlite3 python manage.py runserver 127.0.0.1:8765 --noreload &
          sleep 4
          cd perf && locust -f locustfile_load.py --headless \
            -H http://127.0.0.1:8765 --users 10 --spawn-rate 5 --run-time 30s \
            --only-summary --exit-code-on-error 1

      # ---------- Q5 UI automation ----------
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: UI tests (Playwright)
        run: pytest ui_tests/ -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
